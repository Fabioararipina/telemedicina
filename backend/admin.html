<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Saúde Agora</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.2rem; color: #38bdf8; }
    .badge { background: #0ea5e9; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 32px; width: 320px; }
    .login-box h2 { margin-bottom: 20px; font-size: 1rem; color: #94a3b8; }
    input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #38bdf8; }
    button { width: 100%; padding: 10px; background: #0ea5e9; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    button:hover { background: #0284c7; }
    .container { padding: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.9rem; }
    .tab.active { background: #0ea5e9; border-color: #0ea5e9; color: #fff; font-weight: 600; }
    .stat { display: inline-block; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 20px; margin-bottom: 16px; font-size: 0.85rem; color: #94a3b8; }
    .stat span { font-size: 1.3rem; font-weight: 700; color: #38bdf8; display: block; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
    th { background: #0f172a; padding: 12px 16px; text-align: left; font-size: 0.78rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 12px 16px; border-top: 1px solid #1e293b; font-size: 0.88rem; color: #cbd5e1; }
    tr:hover td { background: #1a2744; }
    .plan-badge { padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .plan-INDIVIDUAL { background: #0c4a6e; color: #38bdf8; }
    .plan-FAMILIAR { background: #14532d; color: #4ade80; }
    .plan-EMPRESARIAL { background: #4c1d95; color: #c4b5fd; }
    .error { color: #f87171; margin-top: 8px; font-size: 0.85rem; }
    #login-section { display: flex; }
    #app-section { display: none; }
  </style>
</head>
<body>

<div id="login-section" class="login-wrap">
  <div class="login-box">
    <h2>Acesso Restrito</h2>
    <input type="password" id="token-input" placeholder="Token de acesso" />
    <button onclick="login()">Entrar</button>
    <p class="error" id="login-error"></p>
  </div>
</div>

<div id="app-section">
  <header>
    <h1>Saúde Agora</h1>
    <span class="badge">Admin</span>
  </header>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('leads')">Pré-Cadastros</button>
      <button class="tab" onclick="showTab('users')">Assinantes</button>
    </div>

    <div id="tab-leads">
      <div class="stat"><span id="leads-count">—</span>pré-cadastros</div>
      <table>
        <thead>
          <tr><th>#</th><th>Nome</th><th>WhatsApp</th><th>Plano de Interesse</th><th>Data</th></tr>
        </thead>
        <tbody id="leads-body"></tbody>
      </table>
    </div>

    <div id="tab-users" style="display:none">
      <div class="stat"><span id="users-count">—</span>assinantes</div>
      <table>
        <thead>
          <tr><th>#</th><th>Nome</th><th>E-mail</th><th>CPF</th><th>Telefone</th><th>Plano</th><th>Data</th></tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let TOKEN = '';
  const API = '/api';

  function login() {
    TOKEN = document.getElementById('token-input').value.trim();
    loadLeads().then(() => {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'block';
    }).catch(() => {
      document.getElementById('login-error').textContent = 'Token inválido.';
    });
  }

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function showTab(tab) {
    document.getElementById('tab-leads').style.display = tab === 'leads' ? '' : 'none';
    document.getElementById('tab-users').style.display = tab === 'users' ? '' : 'none';
    document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (i === 0 && tab === 'leads') || (i === 1 && tab === 'users')));
    if (tab === 'users') loadUsers();
  }

  async function loadLeads() {
    const res = await fetch(`${API}/admin/leads`, { headers: { 'x-admin-token': TOKEN } });
    if (!res.ok) throw new Error('Unauthorized');
    const data = await res.json();
    document.getElementById('leads-count').textContent = data.length;
    document.getElementById('leads-body').innerHTML = data.map((l, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${l.name}</td>
        <td>${l.phone}</td>
        <td><span class="plan-badge plan-${l.plan}">${l.plan}</span></td>
        <td>${new Date(l.createdAt).toLocaleString('pt-BR')}</td>
      </tr>`).join('');
  }

  async function loadUsers() {
    const res = await fetch(`${API}/admin/users`, { headers: { 'x-admin-token': TOKEN } });
    const data = await res.json();
    document.getElementById('users-count').textContent = data.length;
    document.getElementById('users-body').innerHTML = data.map((u, i) => {
      const plan = u.subscriptions?.[0]?.plan?.type || '—';
      return `<tr>
        <td>${i + 1}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.cpf}</td>
        <td>${u.phone || '—'}</td>
        <td><span class="plan-badge plan-${plan}">${plan}</span></td>
        <td>${new Date(u.createdAt).toLocaleString('pt-BR')}</td>
      </tr>`;
    }).join('');
  }
</script>
</body>
</html>
